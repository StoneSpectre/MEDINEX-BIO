version: "3.9"

# Spin up real Postgres + Neo4j locally to develop/test against before
# pointing config.py at your actual cloud infra. Not required if you
# already have managed instances — just set POSTGRES_DSN / NEO4J_URI
# in .env to point at those instead.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: medinex
      POSTGRES_PASSWORD: medinex
      POSTGRES_DB: medinex
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pg_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/change_me
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"  # browser UI
      - "7687:7687"  # bolt
    volumes:
      - neo4j_data:/data

volumes:
  pg_data:
  neo4j_data:
